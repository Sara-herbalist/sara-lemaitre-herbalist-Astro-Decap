backend:
  name: github
  repo: Sara-herbalist/sara-lemaitre-herbalist-Astro-Decap
  branch: main
  base_url: https://sara-lemaitre-herbalist-astro-decap.pages.dev
  auth_endpoint: /api/auth

media_folder: public/images
public_folder: /images

collections:

  # ═══════════════════════════════════════
  #  ENGLISH
  # ═══════════════════════════════════════

  - name: homepage_en
    label: "🇬🇧 Homepage"
    files:
      - name: homepage_en
        label: "Homepage — English"
        file: src/data/homepage.json
        fields:
          - { label: "Hero eyebrow", name: heroEyebrow, widget: string }
          - { label: "Hero description", name: heroDesc, widget: text }
          - { label: "Intro title", name: introTitle, widget: string }
          - { label: "Intro subtitle", name: introSubtitle, widget: string }
          - { label: "Intro body paragraph 1", name: introBody1, widget: text }
          - { label: "Intro body paragraph 2", name: introBody2, widget: text }

  - name: story_en
    label: "🇬🇧 My Story"
    files:
      - name: story_en
        label: "My Story — English"
        file: src/data/story.json
        fields:
          - { label: "Hero title line 1", name: heroTitle1, widget: string }
          - { label: "Hero title line 2 (italic)", name: heroTitle2, widget: string }
          - { label: "Hero title line 3", name: heroTitle3, widget: string }
          - { label: "Hero description", name: heroDesc, widget: text }
          - { label: "Pull quote", name: pullQuote, widget: text }
          - { label: "Section 1 — heading", name: s1h2, widget: string }
          - { label: "Section 1 — paragraph 1", name: s1p1, widget: text }
          - { label: "Section 1 — paragraph 2", name: s1p2, widget: text }
          - { label: "Section 1 — inset quote", name: s1inset, widget: text }
          - { label: "Section 2 — heading", name: s2h2, widget: string }
          - { label: "Section 2 — inset quote", name: s2inset, widget: text }
          - { label: "Section 3 — heading", name: s3h2, widget: string }
          - { label: "Section 3 — inset quote", name: s3inset, widget: text }
          - { label: "Magnolia section — heading", name: magnoliaTitle, widget: string }
          - { label: "Now section — heading", name: nowTitle, widget: string }
          - { label: "Now section — paragraph 1", name: nowP1, widget: text }
          - { label: "Now section — paragraph 2", name: nowP2, widget: text }
          - { label: "Now section — paragraph 3", name: nowP3, widget: text }

  - name: therapies_en
    label: "🇬🇧 Therapies"
    files:
      - name: therapies_en
        label: "Therapies — English"
        file: src/data/therapies.json
        fields:
          - { label: "Hero title", name: heroTitle, widget: string }
          - { label: "Hero description", name: heroDesc, widget: text }
          - { label: "Herbal Medicine — title", name: herbalTitle, widget: string }
          - { label: "Herbal Medicine — paragraph 1", name: herbalP1, widget: text }
          - { label: "Herbal Medicine — paragraph 2", name: herbalP2, widget: text }
          - { label: "Herbal Medicine — paragraph 3", name: herbalP3, widget: text }
          - { label: "Naturopathy — title", name: naturoTitle, widget: string }
          - { label: "Naturopathy — paragraph 1", name: naturoP1, widget: text }
          - { label: "Naturopathy — paragraph 2", name: naturoP2, widget: text }
          - { label: "Indian Head Massage — title", name: ihmTitle, widget: string }
          - { label: "Indian Head Massage — quote", name: ihmQuote, widget: string }
          - { label: "Indian Head Massage — paragraph 1", name: ihmP1, widget: text }
          - { label: "Indian Head Massage — paragraph 2", name: ihmP2, widget: text }
          - { label: "Athlete — title", name: athleteTitle, widget: string }
          - { label: "Athlete — paragraph 1", name: athleteP1, widget: text }
          - { label: "Athlete — paragraph 2", name: athleteP2, widget: text }

  - name: workshops_en
