backend:
  name: github
  repo: Sara-herbalist/sara-lemaitre-herbalist-Astro-Decap
  branch: main
  base_url: https://decap-proxy.netlify.app
 
media_folder: public/images
public_folder: /images

collections:

  # ═══════════════════════════════════════════════════════
  #  🇬🇧  ENGLISH
  # ═══════════════════════════════════════════════════════

  - name: homepage_en
    label: "🇬🇧 Homepage"
    files:
      - name: homepage_en
        label: "Homepage — English"
        file: src/data/homepage.json
        fields:
          - { label: "Hero eyebrow", name: heroEyebrow, widget: string }
          - { label: "Hero description", name: heroDesc, widget: text }
          - { label: "Intro section title", name: introTitle, widget: string }
          - { label: "Intro subtitle", name: introSubtitle, widget: string }
          - { label: "Intro body paragraph 1", name: introBody1, widget: text }
          - { label: "Intro body paragraph 2", name: introBody2, widget: text }
          - { label: "Who I help — section title", name: whoTitle, widget: string }
          - { label: "Who I help — section description", name: whoDesc, widget: text }
          - name: whoCards
            label: "Who I help — 3 cards"
            widget: list
            fields:
              - { label: "Number", name: number, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: desc, widget: text }
              - { label: "Tags (comma separated)", name: tags, widget: list }
          - { label: "Differentiators — title", name: differentTitle, widget: string }
          - { label: "Differentiators — paragraph 1", name: differentDesc1, widget: text }
          - { label: "Differentiators — paragraph 2", name: differentDesc2, widget: text }
          - name: differentItems
            label: "Differentiators — 5 items"
            widget: list
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: desc, widget: text }
          - { label: "Process — section title", name: processTitle, widget: string }
          - name: processSteps
            label: "Process — 4 steps"
            widget: list
            fields:
              - { label: "Step title", name: title, widget: string }
              - { label: "Step description", name: desc, widget: text }
          - name: testimonials
            label: "Testimonials — 3 slots"
            widget: list
            fields:
              - { label: "Quote text (leave blank = coming soon)", name: text, widget: text, required: false }
              - { label: "Author", name: author, widget: string }
              - { label: "Condition / treatment", name: condition, widget: string, required: false }
          - { label: "International — section title", name: internationalTitle, widget: string }
          - { label: "International — paragraph 1", name: internationalDesc1, widget: text }
          - { label: "International — paragraph 2", name: internationalDesc2, widget: text }
          - name: regions
            label: "International regions — 6 items"
            widget: list
            fields:
              - { label: "Region name", name: name, widget: string }
              - { label: "Description", name: desc, widget: text }
          - { label: "Final CTA — heading", name: ctaTitle, widget: string }
          - { label: "Final CTA — body text", name: ctaDesc, widget: text }
          - { label: "Hero portrait photo", name: heroPortrait, widget: image, required: false }
          - { label: "Practice photo 1", name: practicePhoto1, widget: image, required: false }
          - { label: "Practice photo 2", name: practicePhoto2, widget: image, required: false }
          - { label: "Practice photo 3", name: practicePhoto3, widget: image, required: false }
          - { label: "Story pull portrait", name: storyPullPortrait, widget: image, required: false }

  - name: story_en
    label: "🇬🇧 My Story"
    files:
      - name: story_en
        label: "My Story — English"
        file: src/data/story.json
        fields:
          - { label: "Hero title line 1", name: heroTitle1, widget: string }
          - { label: "Hero title line 2 (italic)", name: heroTitle2, widget: string }
          - { label: "Hero title line 3", name: heroTitle3, widget: string }
          - { label: "Hero description", name: heroDesc, widget: text }
          - { label: "Pull quote", name: pullQuote, widget: text }
          - { label: "Section 1 — heading", name: s1h2, widget: string }
          - { label: "Section 1 — paragraph 1", name: s1p1, widget: text }
          - { label: "Section 1 — paragraph 2", name: s1p2, widget: text }
          - { label: "Section 1 — paragraph 3", name: s1p3, widget: text }
          - { label: "Section 1 — paragraph 4", name: s1p4, widget: text }
          - { label: "Section 1 — paragraph 5", name: s1p5, widget: text }
          - { label: "Section 1 — inset quote", name: s1inset, widget: text }
          - { label: "Section 2 — heading", name: s2h2, widget: string }
          - { label: "Section 2 — paragraph 1", name: s2p1, widget: text }
          - { label: "Section 2 — paragraph 2", name: s2p2, widget: text }
          - { label: "Section 2 — paragraph 3", name: s2p3, widget: text }
          - { label: "Section 2 — paragraph 4", name: s2p4, widget: text }
          - { label: "Section 2 — paragraph 5", name: s2p5, widget: text }
          - { label: "Section 2 — inset quote", name: s2inset, widget: text }
          - { label: "Section 3 — heading", name: s3h2, widget: string }
          - { label: "Section 3 — paragraph 1", name: s3p1, widget: text }
          - { label: "Section 3 — paragraph 2", name: s3p2, widget: text }
          - { label: "Section 3 — paragraph 3", name: s3p3, widget: text }
          - { label: "Section 3 — paragraph 4", name: s3p4, widget: text }
          - { label: "Section 3 — paragraph 5", name: s3p5, widget: text }
          - { label: "Section 3 — inset quote", name: s3inset, widget: text }
          - { label: "Section 4 — heading", name: s4h2, widget: string }
          - { label: "Section 4 — paragraph 1", name: s4p1, widget: text }
          - { label: "Section 4 — paragraph 2", name: s4p2, widget: text }
          - { label: "Section 4 — paragraph 3", name: s4p3, widget: text }
          - { label: "Magnolia — heading", name: magnoliaTitle, widget: string }
          - { label: "Magnolia — paragraph 1", name: magnoliaP1, widget: text }
          - { label: "Magnolia — paragraph 2", name: magnoliaP2, widget: text }
          - { label: "Magnolia — paragraph 3", name: magnoliaP3, widget: text }
          - { label: "Magnolia — paragraph 4", name: magnoliaP4, widget: text }
          - { label: "Magnolia — paragraph 5", name: magnoliaP5, widget: text }
          - { label: "Magnolia — paragraph 6", name: magnoliaP6, widget: text }
          - { label: "Graduation — heading", name: graduationTitle, widget: string }
          - { label: "Graduation — paragraph 1", name: graduationP1, widget: text }
          - { label: "Graduation — paragraph 2", name: graduationP2, widget: text }
          - { label: "Graduation — paragraph 3", name: graduationP3, widget: text }
          - { label: "Graduation — paragraph 4", name: graduationP4, widget: text }
          - { label: "Graduation — paragraph 5", name: graduationP5, widget: text }
          - { label: "Now section — heading", name: nowTitle, widget: string }
          - { label: "Now section — paragraph 1", name: nowP1, widget: text }
          - { label: "Now section — paragraph 2", name: nowP2, widget: text }
          - { label: "Now section — paragraph 3", name: nowP3, widget: text }
          - name: credentials
            label: "Credentials panel"
            widget: list
            fields:
              - { label: "Credential name", name: name, widget: string }
              - { label: "Detail", name: detail, widget: string }
          - { label: "Hero photo (athlete / personal)", name: heroPhoto, widget: image, required: false }
          - { label: "Magnolia photo", name: magnoliaPhoto, widget: image, required: false }
          - { label: "Professional portrait", name: portraitPhoto, widget: image, required: false }

  - name: therapies_en
    label: "🇬🇧 Therapies"
    files:
      - name: therapies_en
        label: "Therapies — English — add, remove, reorder"
        file: src/data/therapies.json
        fields:
          - { label: "Page title", name: pageTitle, widget: string }
          - { label: "Page description", name: pageDesc, widget: text }
          - name: therapyBlocks
            label: "Therapy blocks (add, remove, reorder)"
            widget: list
            fields:
              - { label: "ID (URL anchor, no spaces e.g. herbal)", name: id, widget: string }
              - { label: "Label (small text above title)", name: label, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Duration", name: duration, widget: string, required: false }
              - { label: "Format", name: format, widget: string, required: false }
              - { label: "Price (leave blank if included in consultations)", name: price, widget: string, required: false }
              - { label: "Calendly URL (overrides global setting)", name: calendlyUrl, widget: string, required: false }
              - { label: "Book button label (leave blank to hide button)", name: bookLabel, widget: string, required: false }
              - name: paragraphs
                label: "Content paragraphs"
                widget: list
                field: { label: Paragraph, name: paragraph, widget: text }
              - { label: "Photo", name: photo, widget: image, required: false }
          - { label: "Plant strip photo 1", name: plantStrip1, widget: image, required: false }
          - { label: "Plant strip photo 2", name: plantStrip2, widget: image, required: false }
          - { label: "Plant strip photo 3", name: plantStrip3, widget: image, required: false }
          - { label: "Plant strip photo 4", name: plantStrip4, widget: image, required: false }

  - name: pricing_shared
    label: "💷 Pricing (EN + FR)"
    files:
      - name: pricing_shared
        label: "Prices — updates both languages"
        file: src/data/pricing.json
        fields:
          - { label: "Show programme packages on page", name: showPackages, widget: boolean, default: true }
          - { label: "Pricing philosophy note", name: pricingNote, widget: text }
          - { label: "Initial consultation (£)", name: initialConsultation, widget: number }
          - { label: "Initial sliding scale (£)", name: initialConsultationSlidingScale, widget: number }
          - { label: "Follow-up (£)", name: followUp, widget: number }
          - { label: "Follow-up sliding scale (£)", name: followUpSlidingScale, widget: number }
          - { label: "Bundle 3 sessions (£)", name: bundle3Sessions, widget: number }
          - { label: "Bundle sliding scale (£)", name: bundle3SessionsSlidingScale, widget: number }
          - { label: "Indian Head Massage (£)", name: ihm, widget: number }
          - name: initialIncludes
            label: "Initial consultation — includes list"
            widget: list
            field: { label: Item, name: item, widget: string }
          - name: followupIncludes
            label: "Follow-up — includes list"
            widget: list
            field: { label: Item, name: item, widget: string }
          - name: bundleIncludes
            label: "Bundle — includes list"
            widget: list
            field: { label: Item, name: item, widget: string }
          - name: packages
            label: "Programme packages (shown/hidden by toggle above)"
            widget: list
            fields:
              - { label: "Tag line", name: tag, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Price (£)", name: price, widget: number }
              - { label: "Saving (£)", name: saving, widget: number }
              - name: includes
                label: "Includes list"
                widget: list
                field: { label: Item, name: item, widget: string }
          - { label: "Hormonal Reset programme (£)", name: hormonalReset, widget: number }
          - { label: "Stress & Burnout programme (£)", name: stressBurnout, widget: number }
          - { label: "Perimenopause programme (£)", name: perimenopause, widget: number }
          - { label: "Athlete Performance programme (£)", name: athletePerformance, widget: number }
          - { label: "Retainer Standard /mo (£)", name: retainerStandard, widget: number }
          - { label: "Retainer Intensive /mo (£)", name: retainerIntensive, widget: number }
          - name: cancellationTiers
            label: "Cancellation policy — 3 tiers"
            widget: list
            fields:
              - { label: "Tier title", name: title, widget: string }
              - { label: "Policy text", name: policy, widget: text }
          - { label: "Cancellation note", name: cancellationNote, widget: text }

  - name: book_en
    label: "🇬🇧 Book"
    files:
