            fields:
              - { label: "Tag (duration / format)", name: tag, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Price in £ (0 = free)", name: price, widget: number }
              - { label: "Sliding scale price (0 = no sliding scale)", name: slidingScale, widget: number }
              - { label: "Duration", name: duration, widget: string }
              - { label: "Description", name: desc, widget: text }
              - { label: "Calendly URL", name: calendlyUrl, widget: string, required: false }
              - { label: "Featured card (highlighted)", name: featured, widget: boolean, default: false }
              - { label: "Show sliding scale note", name: showSlidingScale, widget: boolean, default: false }
              - { label: "Book button label", name: bookLabel, widget: string }
          - { label: "Hero photo (you at desk)", name: heroPhoto, widget: image, required: false }
          - { label: "Accent photo (herbs)", name: accentPhoto, widget: image, required: false }

