          - { label: "Workshop 1 — description", name: w1Desc, widget: text }
          - { label: "Workshop 2 — title", name: w2Title, widget: string }
          - { label: "Workshop 2 — description", name: w2Desc, widget: text }
          - { label: "Workshop 3 — title", name: w3Title, widget: string }
          - { label: "Workshop 3 — description", name: w3Desc, widget: text }
          - { label: "Workshop 4 — title", name: w4Title, widget: string }
          - { label: "Workshop 4 — description", name: w4Desc, widget: text }

  - name: walks_en
