  - name: settings_fr
    label: "Réglages (FR)"
    files:
      - name: settings_fr
        label: "Réglages — version française"
        file: src/data/fr/settings.json
        fields:
          - { label: "URL Calendly", name: calendlyUrl, widget: string }
          - { label: "URL Instagram", name: instagramUrl, widget: string }
          - { label: "URL LinkedIn", name: linkedinUrl, widget: string }
