          - { label: "Choose consultation — title", name: chooseTitle, widget: string }
          - { label: "Choose consultation — description", name: chooseDesc, widget: text }
          - { label: "Discovery call — title", name: discoveryTitle, widget: string }
          - { label: "Discovery call — description", name: discoveryDesc, widget: text }
          - { label: "Initial consultation — title", name: initialTitle, widget: string }
          - { label: "Initial consultation — description", name: initialDesc, widget: text }
          - { label: "Follow-up — title", name: followupTitle, widget: string }
          - { label: "Follow-up — description", name: followupDesc, widget: text }
          - { label: "Bundle — title", name: bundleTitle, widget: string }
          - { label: "Bundle — description", name: bundleDesc, widget: text }
          - { label: "Indian Head Massage — title", name: ihmTitle, widget: string }
          - { label: "Indian Head Massage — description", name: ihmDesc, widget: text }
          - { label: "Other services box — title", name: getInTouchTitle, widget: string }
          - { label: "Other services box — description", name: getInTouchDesc, widget: text }
          - { label: "Cancellation — title", name: cancellationTitle, widget: string }
          - name: cancellationTiers
            label: "Cancellation — 3 tiers"
            widget: list
            fields:
              - { label: "Tier title", name: title, widget: string }
              - { label: "Policy text", name: policy, widget: text }
          - { label: "Cancellation — footnote", name: cancellationNote, widget: text }
          - { label: "Final CTA — title", name: finalCtaTitle, widget: string }
          - { label: "Final CTA — description", name: finalCtaDesc, widget: text }
          - { label: "Bank — account name", name: bankName, widget: string }
          - { label: "Bank — sort code", name: bankSort, widget: string }
          - { label: "Bank — account number", name: bankAccount, widget: string }
          - name: consultationCards
