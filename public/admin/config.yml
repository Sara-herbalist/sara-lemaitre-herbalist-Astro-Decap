backend:
  name: github
  repo: Sara-herbalist/sara-lemaitre-herbalist-Astro-Decap
  branch: main
  base_url: https://sara-lemaitre-herbalist-astro-decap.pages.dev
  auth_endpoint: /api/auth

media_folder: public/images
public_folder: /images

collections:

  # ── PAGES ────────────────────────────────────────────────────
  - name: pages
    label: Pages
    files:

      - name: homepage
        label: Homepage
        file: src/data/homepage.json
        fields:
          - { label: "Hero eyebrow", name: heroEyebrow, widget: string }
          - { label: "Hero description", name: heroDesc, widget: text }
          - { label: "Practice section title", name: introTitle, widget: string }
          - { label: "Practice section text", name: introBody, widget: text }

      - name: pricing
        label: Pricing
        file: src/data/pricing.json
        fields:
          - { label: "Initial consultation (£)", name: initialConsultation, widget: number }
          - { label: "Follow-up consultation (£)", name: followUp, widget: number }
          - { label: "Athlete consultation (£)", name: athleteConsultation, widget: number }
          - { label: "Hormonal Reset Programme (£)", name: hormonalReset, widget: number }
          - { label: "Stress & Burnout Recovery (£)", name: stressBurnout, widget: number }
          - { label: "Perimenopause Support (£)", name: perimenopause, widget: number }
          - { label: "Athlete Performance & Recovery (£)", name: athletePerformance, widget: number }
          - { label: "Indian Head Massage (£)", name: ihm, widget: number }
          - { label: "Monthly retainer Standard (£)", name: retainerStandard, widget: number }
          - { label: "Monthly retainer Intensive (£)", name: retainerIntensive, widget: number }

      - name: settings
        label: Settings
        file: src/data/settings.json
        fields:
          - { label: "Calendly URL", name: calendlyUrl, widget: string }
          - { label: "Instagram URL", name: instagramUrl, widget: string }
          - { label: "LinkedIn URL", name: linkedinUrl, widget: string }
          - { label: "Contact email", name: email, widget: string }

  # ── WORKSHOPS ────────────────────────────────────────────────
  - name: workshops
    label: Workshops
    folder: src/data/workshops
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Description", name: description, widget: text }
      - { label: "Duration", name: duration, widget: string, hint: "e.g. 3 hours" }
      - { label: "Format", name: format, widget: string, hint: "e.g. In person · Online" }
      - { label: "Price", name: price, widget: string, hint: "e.g. £45 per person" }

  # ── TESTIMONIALS ─────────────────────────────────────────────
  - name: testimonials
    label: Testimonials
    folder: src/data/testimonials
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Quote", name: quote, widget: text }
      - { label: "Author (first name or initials)", name: author, widget: string }
      - { label: "Condition or context", name: condition, widget: string, hint: "e.g. Endometriosis" }
